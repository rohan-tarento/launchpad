# GitLab stub — same org ≠ project pattern as onboarding-kola.yaml (apex-common / kola).

apiVersion: launchpad/v1
kind: OnboardingSpec

client_id: kola-gitlab
project_slug: kola
repo_prefix: kola
display_name: KOLA GitLab

forge:
  type: gitlab

org: apex-common
meta_repo: kola-meta

paths:
  workspace: .
  spec: onboarding.yaml

repos:
  prefix: kola
  apps:
    - suffix: api
      profile: backend
      private: true

rules:
  python:
    repo: drivestream-lab/python-services-rules
    initial_ref: v0.1.0

gitflow:
  branch_naming_mode: strict

registry:
  register_client: true
  set_default: false

provision:
  run_setup_platform: false
