apiVersion: launchpad/v1
kind: OrgConfig

org: kd_diet_coke

forge:
  type: github

# App repos — factory creates these. diet_coke-meta is created/pushed separately.
repos:
  - name: diet_coke-api
    private: true
    description: "Diet Coke core API"
  - name: diet_coke-bff
    private: true
    description: "Diet Coke BFF / ops portal"
  - name: diet_coke-registry
    private: true
    description: "Diet Coke service registry"

labels:
  - name: initiative
    color: "1E3A8A"
    description: "Platform epic / INIT work"
  - name: bug
    color: "B60205"
    description: "Defect"
  - name: chore
    color: "FBCA04"
    description: "Tooling / hygiene"

teams:
  - slug: release-managers
    description: "Release managers — only merge to main"
    privacy: closed
  - slug: pm-team
    description: "Product — meta develop merges, spec handoff"
    privacy: closed
  - slug: backend-devs
    description: "Backend services"
    privacy: closed
  - slug: frontend-devs
    description: "BFF / frontend"
    privacy: closed
  - slug: platform-devs
    description: "Platform / IaC"
    privacy: closed
