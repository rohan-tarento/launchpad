apiVersion: launchpad/v1
kind: ProjectConfig

org: kd_diet_coke
project_title: Diet Coke Engineering

status_columns:
  - Backlog
  - Spec/CR
  - Ready
  - In progress
  - Verify
  - In review
  - Done

fields:
  - name: Initiative
    type: TEXT
  - name: CR
    type: TEXT
  - name: Codebase
    type: SINGLE_SELECT
    options:
      - diet_coke-meta
      - diet_coke-api
      - diet_coke-bff
      - diet_coke-registry
  - name: Spec path
    type: TEXT
  - name: Verify command
    type: TEXT
  - name: As-built
    type: SINGLE_SELECT
    options:
      - yes
      - no
      - N/A
  - name: QA manifest
    type: TEXT

repos:
  - diet_coke-api
  - diet_coke-bff
  - diet_coke-registry

issue_types:
  required: true
  roles:
    epic: Epic
    task: Task
  ensure:
    - name: Epic
      color: purple
      description: Platform epic / initiative container
    - name: Task
      color: green
      description: Delivery task
