# INIT-EXAMPLE-001 — synthetic wave manifest (documentation only)
# Example WorkManifest — archive / documentation only (v0.5.10).
# Board seeding: gh issue create per wave from plan §9 (see playbook/ship/delivery-workflow.md).

apiVersion: launchpad/v1
kind: WorkManifest

initiative: INIT-EXAMPLE-001

metadata:
  title: INIT-EXAMPLE-001 — example platform slice
  summary: |
    Example waves model — W0 structure, W1 domain. Replace with a real INIT after PRD sign-off.
  playbook:
    - prd/INIT-EXAMPLE-001.md
    - playbook/ship/delivery-workflow.md

target:
  org: example-org
  project: Example Engineering

defaults:
  initiative: INIT-EXAMPLE-001
  parent: EPIC
  cr: N/A
  as_built: "no"
  qa_manifest: N/A
  status: Backlog
  labels:
    - initiative

epic:
  id: EPIC
  repo: example-meta
  title: "[feature] INIT-EXAMPLE-001 — example initiative"
  codebase: example-meta
  spec_path: prd/INIT-EXAMPLE-001.md
  verify_command: N/A
  labels:
    - initiative
  body: |
    ## Objective

    Synthetic epic for WorkManifest documentation (archive format).

work:
  - id: W0
    kind: issue
    repo: example-api
    title: "[W0] Repo structure + CI skeleton"
    depends_on: []
    codebase: example-api
    spec_path: docs/specification/product/INIT-EXAMPLE-001.md
    verify_command: make check && make test
    status: Backlog

  - id: W1
    kind: issue
    repo: example-api
    title: "[W1] First domain slice"
    depends_on:
      - W0
    codebase: example-api
    spec_path: docs/specification/product/INIT-EXAMPLE-001.md
    verify_command: make check && make test
    status: Backlog
