# Harness pins — rules submodule + prayog-skills dev bundle
# Copy to config/harness-<org>.yaml in your tenant meta repo.
# SSOT: playbook/harness-pins.md

apiVersion: launchpad/v1
kind: HarnessConfig

org: example-org

default_workspace: ..

meta:
  profile: meta-pm

profiles:
  meta-pm:
    agent_skills:
      repo: drivestream-lab/prayog-skills
      url: https://github.com/drivestream-lab/prayog-skills.git
      ref: v0.3.0
      skills:
        - validate-requirements
        - review-findings
        - update-documents
        - generate-work-manifest
      skill_paths:
        validate-requirements: skills/pm/validate-requirements/SKILL.md
        review-findings: skills/pm/review-findings/SKILL.md
        update-documents: skills/pm/update-documents/SKILL.md
        generate-work-manifest: skills/pm/generate-work-manifest/SKILL.md
      install_path: .agents/skills
      lock_file: skills-lock.json
    community_skills:
      - source: github/awesome-copilot
        skill: prd
    agents_template: templates/AGENTS.meta.md
    pin_template: templates/harness-pin.meta.yaml

  python-backend:
    rules:
      repo: your-org/service-rules
      url: https://github.com/your-org/service-rules.git
      ref: v0.0.0
      path: .cursor/rules
    agent_skills:
      repo: drivestream-lab/prayog-skills
      url: https://github.com/drivestream-lab/prayog-skills.git
      ref: v0.3.0
      skills:
        - spec-feasibility-review
        - spec-technical-review
        - spec-implementation-plan
        - pre-implement
        - loop-spec
        - ground-spec
        - verify
      skill_paths:
        spec-feasibility-review: skills/development/spec-feasibility-review/SKILL.md
        spec-technical-review: skills/development/spec-technical-review/SKILL.md
        spec-implementation-plan: skills/development/spec-implementation-plan/SKILL.md
        pre-implement: skills/development/pre-implement/SKILL.md
        loop-spec: skills/development/loop-spec/SKILL.md
        ground-spec: skills/development/ground-spec/SKILL.md
        verify: skills/development/verify/SKILL.md
      install_path: .agents/skills
      lock_file: skills-lock.json
    check_command: "make check"
    test_command: "make test"
    setup_notes: "conda activate {{CONDA_ENV}}"
    agents_template: templates/AGENTS.md
    pin_template: templates/harness-pin.yaml

repos:
  example-api:
    profile: python-backend
