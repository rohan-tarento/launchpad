# Service catalog — maintained by launchpad (sync-catalog / onboard apply)
#
# Copy to service-catalog-<org>.yaml and edit org/repos.
# Used by PM/dev skills (e.g. /prd-impact-map) and strict branch naming.
# branch_code is the {COMPONENT} in feature/INIT-{COMPONENT}-{NUMBER}-{slug}
#
# Curate owns, depends_on, and descriptions here — sync preserves your edits.
# Add new repos via onboarding/scaffold, then: launchpad sync-catalog --apply

apiVersion: launchpad/v1
kind: ServiceCatalog
org: example-org
services:
  - name: example-meta
    repo: example-org/example-meta
    team: platform-devs
    branch_code: META
    description: Tenant meta — PRDs, work manifests, factory config, and playbook.
    owns:
      - PRD and initiative management
      - factory configuration
      - platform playbook
    depends_on: []
  - name: example-api
    repo: example-org/example-api
    team: backend-devs
    branch_code: API
    description: example-api — update description in service-catalog-<org>.yaml
    owns: []
    depends_on: []
  - name: example-registry
    repo: example-org/example-registry
    team: backend-devs
    branch_code: REGISTRY
    description: example-registry — update description in service-catalog-<org>.yaml
    owns: []
    depends_on: []
