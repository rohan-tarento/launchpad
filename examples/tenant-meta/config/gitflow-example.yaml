# Copy to gitflow-<org>.yaml and edit before:
#   launchpad setup-gitflow --config config/gitflow-<org>.yaml --apply
#
# Policy is authoritative in this file only — no CLI flags for naming, merge, PR, or CI.

apiVersion: launchpad/v1
kind: GitflowConfig

org: example-org

teams:
  release_managers: release-managers
  pm: pm-team
  backend: backend-devs
  frontend: frontend-devs
  platform: platform-devs
  data_platform: data-platform-devs

profiles:
  backend: backend
  frontend: frontend
  platform: platform
  data_platform: data_platform

repos:
  example-api:
    profile: backend
  example-registry:
    profile: backend
  # example-bff:
  #   profile: frontend
  # example-platform:
  #   profile: data_platform

# Automation switches (all policy — edit here, not on the CLI)
options:
  require_ci: false
  branch_naming: false
  with_templates: false
  init_empty: false
  workspace: ..   # parent directory of local repo clones (for with_templates)

# Branch naming (ruleset + policy-branch-name workflow when options.branch_naming is true)
branch_naming:
  mode: standard          # standard | strict
  allowed_prefixes:
    - feature
    - fix
    - hotfix
    - release
    - chore
  exceptions:
    - dependabot/*
  block_sources:
    - main
    - develop

# PR / review rules on protected branches
protection:
  develop:
    required_approving_review_count: 1
    dismiss_stale_reviews: true
    require_code_owner_reviews: false
    enforce_admins: true
  main:
    required_approving_review_count: 1
    dismiss_stale_reviews: true
    require_code_owner_reviews: false
    enforce_admins: true

# Merge source policy (policy-merge-source workflow when options.require_ci is true)
merge_policy:
  develop:
    allowed_head_prefixes:
      - feature
      - fix
      - chore
      - hotfix
    block_sources:
      - main
      - develop
  main:
    allowed_head_refs:
      - develop
    allowed_head_prefixes:
      - release
      - hotfix
