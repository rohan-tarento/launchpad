apiVersion: launchpad/v1
kind: PlatformManifest

org: example-org
name: platform baseline

setup:
  - id: repos
    command: bootstrap-org
    config: config/org-example.yaml

  - id: teams
    command: bootstrap-teams
    config: config/org-example.yaml

  - id: seed
    command: seed-repos
    config: config/gitflow-example.yaml

  - id: gitflow
    command: setup-gitflow
    config: config/gitflow-example.yaml

  - id: board
    command: bootstrap-project
    config: config/project-example.yaml

verify:
  config: config/verify-platform-example.yaml
