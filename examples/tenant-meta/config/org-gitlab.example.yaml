# GitLab tenant example — copy to org-<group>.yaml

apiVersion: launchpad/v1
kind: OrgConfig

org: example-org
# GitLab: group path (same field as GitHub org slug in manifests)

forge:
  type: gitlab
  host: https://gitlab.com

repos:
  - name: example-meta
    private: true
    description: "tenant meta"
  - name: example-api
    private: true
    description: "example API service"

labels:
  - name: initiative
    color: "1E3A8A"
    description: "Platform epic / INIT work"

teams: []
