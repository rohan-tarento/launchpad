apiVersion: launchpad/v1
kind: ScaffoldConfig

# ─── Scaffold: cookiecutter template sources ───────────────────────────────
# Rename to scaffold-<org>.yaml (e.g. scaffold-apex-common.yaml).
# Run:  launchpad apply-scaffold --meta --dry-run         to preview meta scaffold.
#       launchpad apply-scaffold --repo <name> --dry-run  to preview a repo.
#       launchpad apply-scaffold --meta --apply           to execute.
#
# Scaffold is OPTIONAL for every repo.
# context: fields are passed FREE-FORM to cookiecutter — no Launchpad validation.
# Template owners evolve cookiecutter.json without any kit changes.
#
# Template sources:
#   gh:<org>/<repo>            → https://github.com/<org>/<repo>
#   git+https://...            → arbitrary git URL
#   /absolute/path/to/template → local filesystem

org: example-org

# ─── Meta repo scaffold ────────────────────────────────────────────────────
meta:
  enabled: false          # set true when ready, then run apply-scaffold --meta --apply
  engine: cookiecutter
