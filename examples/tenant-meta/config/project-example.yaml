# GitHub Project bootstrap — example-org (production template)
# Rename to project-<org>.yaml and edit repo list

org: example-org
includes:
  org: org-example.yaml
project_title: Example Engineering

status_columns:
  - Backlog
  - Spec/CR
  - Ready
  - In progress
  - Verify
  - In review
  - Done

fields:
  - name: Initiative
    type: TEXT
  - name: CR
    type: TEXT
  - name: Codebase
    type: SINGLE_SELECT
    options:
      - example-api
      - example-registry
      - example-bff
      - iac-local
      - iac
      # add example-platform, example-bff, etc. as repos join the model
  - name: Spec path
    type: TEXT
  - name: Verify command
    type: TEXT
  - name: As-built
    type: SINGLE_SELECT
    options:
      - yes
      - no
      - N/A
  - name: QA manifest
    type: TEXT

repos:
  - example-api
  - example-registry
  - example-bff
  # extend per promotion manifest

# Grant every team in org-example.yaml access to the board (READER).
# PM team can edit the board (WRITER). Omit team_access to skip.
team_access:
  default_role: WRITER

# `roles.epic` maps manifest kind `epic` → org issue type name (often Epic or Feature).
issue_types:
  required: true
  roles:
    epic: Epic
    task: Task
  ensure:
    - name: Epic
      color: purple
      description: Platform epic / initiative container (parent issue)
    # Enterprise orgs with built-in types: set epic: Feature and ensure only missing types, e.g.:
    # roles: { epic: Feature, task: Task }
    # ensure: [{ name: Feature, color: purple, description: Initiative parent issue }]
