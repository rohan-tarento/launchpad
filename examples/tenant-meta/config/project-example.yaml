# GitHub Project bootstrap — example-org (production template)
# Rename to project-<org>.yaml and edit repo list

org: example-org
project_title: Example Engineering

status_columns:
  - Backlog
  - Spec/CR
  - Ready
  - In progress
  - Verify
  - In review
  - Done

fields:
  - name: Initiative
    type: TEXT
  - name: CR
    type: TEXT
  - name: Codebase
    type: SINGLE_SELECT
    options:
      - example-api
      - example-registry
      - example-bff
      - iac-local
      - iac
      # add example-platform, example-bff, etc. as repos join the model
  - name: Spec path
    type: TEXT
  - name: Verify command
    type: TEXT
  - name: As-built
    type: SINGLE_SELECT
    options:
      - yes
      - no
      - N/A
  - name: QA manifest
    type: TEXT

repos:
  - example-api
  - example-registry
  - example-bff
  # extend per promotion manifest

issue_types:
  required: true
  roles:
    epic: Epic
    task: Task
  ensure:
    - name: Epic
      color: purple
      description: Platform epic / initiative container (parent issue)
