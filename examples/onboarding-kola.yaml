# Example OnboardingSpec — illustrative KOLA programme on a shared enterprise org.
#
# Pattern: forge org (apex-common) ≠ project slug (kola). Repos are kola-* on apex-common.
# Copy to your workspace and edit:
#
#   mkdir -p ~/Workspace/kola && cd ~/Workspace/kola
#   cp examples/onboarding-kola.yaml ./onboarding.yaml
#   launchpad onboard plan --spec ./onboarding.yaml
#   launchpad onboard apply --spec ./onboarding.yaml

apiVersion: launchpad/v1
kind: OnboardingSpec

client_id: kola
project_slug: kola
repo_prefix: kola
display_name: KOLA

forge:
  type: github   # github | gitlab (gitlab: scaffold stubbed; see plan warnings)

org: apex-common
meta_repo: kola-meta

paths:
  workspace: .
  spec: onboarding.yaml

repos:
  prefix: kola
  apps:
    - suffix: api
      profile: backend
      description: KOLA API
      private: true
    - suffix: portal
      profile: frontend
      description: KOLA BFF portal
      private: true

rules:
  python:
    repo: drivestream-lab/python-services-rules
    initial_ref: v0.1.0
  frontend:
    repo: drivestream-lab/nextjs-bff-rules
    initial_ref: v0.1.0

agent_skills:
  repo: drivestream-lab/prayog-skills
  ref: v0.4.0

teams:
  - slug: pm-team
  - slug: backend-devs
  - slug: frontend-devs
  - slug: platform-devs
  - slug: data-platform-devs
  - slug: release-managers
  - slug: qa-team
  - slug: pe-team

gitflow:
  require_ci: true
  branch_naming: true
  with_templates: true
  branch_naming_mode: strict

project:
  name: KOLA Engineering

overrides:
  generate_templates: true
  generate_playbook_hub: true
  board_url: ""

registry:
  register_client: true
  set_default: false
  secrets_stub: true

provision:
  run_setup_platform: false
  run_doctor: true
