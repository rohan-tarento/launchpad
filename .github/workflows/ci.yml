name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e .
      - name: CLI smoke
        run: |
          launchpad --help
          launchpad doctor || true
      - name: Import package
        run: python -c "from launchpad import __version__; print(__version__)"
      - name: Version matches pyproject.toml
        run: |
          python -c "
          import tomllib
          from pathlib import Path
          from launchpad import __version__
          expected = tomllib.loads(Path('pyproject.toml').read_text())['project']['version']
          assert __version__ == expected, f'__version__={__version__!r} != pyproject {expected!r}'
          print(f'version OK: {__version__}')
          "
