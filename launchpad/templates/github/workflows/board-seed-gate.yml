# Optional gate after spec PR merge — copy to .github/workflows/ and customize.
# Validates that a merged spec PR had spec-lgtm and left a plan on develop.
# Does not create board issues automatically; run board-seed manually or add a job.

name: board-seed-gate

on:
  pull_request:
    types: [closed]
    branches: [develop]

jobs:
  validate-spec-merge:
    if: >-
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'spec')
    runs-on: ubuntu-latest
    steps:
      - name: Require spec-lgtm on merged spec PR
        run: |
          labels="${{ join(github.event.pull_request.labels.*.name, ',') }}"
          echo "Merged PR labels: $labels"
          if ! echo "$labels" | grep -q 'spec-lgtm'; then
            echo "::error::Spec PR merged without spec-lgtm on head — Gate 2 violation"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: develop

      - name: Require implementation plan on develop
        run: |
          if ! ls docs/specification/reports/Implementation-Plan-*.md 1>/dev/null 2>&1; then
            echo "::error::No Implementation-Plan on develop after spec merge"
            exit 1
          fi
          echo "Plan present on develop — run board-seed from plan section 9"

      - name: Next step
        run: |
          echo "Board seed is manual in pilot: create W0..Wn issues from plan section 9"
          echo "Then /pre-implement on the wave branch — not on the spec PR branch"
