apiVersion: launchpad/v1
kind: GovernanceConfig

# Day 1: meta repo only.  App repos are added incrementally on Day N.
org: apex-common

stack_profiles:
  meta-pm: Programme management & ADR meta repo

teams:
  - name: platform-core
    description: Platform owners
    privacy: closed

repos:
  kola-meta:
    stack: meta-pm
    teams: [platform-core]
    visibility: private
    description: Control-plane for KOLA

policy:
  default_branch: main
  integration_branch: develop
  require_pr_reviews: 1
  dismiss_stale_reviews: true

project_board:
  enabled: true
  name: KOLA Board
