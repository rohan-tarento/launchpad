apiVersion: launchpad/v1
kind: GovernanceConfig

# Day N: one app repo added after meta is live.
org: apex-common

stack_profiles:
  meta-pm: Programme management & ADR meta repo
  python-backend: Python / FastAPI microservice

teams:
  - name: platform-core
    description: Platform owners
    privacy: closed
  - name: hitl-dev
    description: HITL application developers
    privacy: closed

repos:
  kola-meta:
    stack: meta-pm
    teams: [platform-core]
    visibility: private

  kola-platform-core:
    stack: python-backend
    teams: [platform-core]
    visibility: private
    description: Core platform microservice
